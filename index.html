<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdventureX Countdown</title>
<style>
  @font-face {
    font-family: 'Orbix';
    src: url('./static/Orbix-Regular.ttf') format('truetype');
    font-display: swap;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #0a0a0a 0%, #1a0a1a 100%);
    color: #fff;
    font-family: 'Orbix', 'Courier New', monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    overflow-x: hidden;
    position: relative;
  }
  #particles-js {
    position: fixed;
    width: 100%; height: 100%;
    z-index: 0; top: 0; left: 0;
  }
  .countdown-container {
    text-align: center;
    z-index: 1;
    position: relative;
    padding: 3rem 2rem;
    border-radius: 20px;
    max-width: 90%;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(244,133,41,0.2);
    box-shadow: 0 8px 32px rgba(244,133,41,0.1);
  }
  /* Brand logo animation */
  .title-logo {
    margin-bottom: 2rem;
    animation: logo-glow 2s ease-in-out infinite alternate;
  }
  @keyframes logo-glow {
    from { filter: drop-shadow(0 0 15px rgba(244,133,41,0.7)) drop-shadow(0 0 30px rgba(244,133,41,0.3)); }
    to   { filter: drop-shadow(0 0 25px rgba(244,133,41,1))   drop-shadow(0 0 50px rgba(244,133,41,0.6)); }
  }
  .title-logo svg { max-width: 700px; width: 100%; display: block; margin: 0 auto; }
  /* Subtitle for "Event Countdown" */
  .subtitle {
    font-size: clamp(0.8rem, 2.5vw, 1.1rem);
    color: #f4a55d;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    margin-top: -0.5rem;
    margin-bottom: 2rem;
  }
  .event-selector {
    margin-bottom: 2rem;
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .event-btn {
    background: rgba(244,133,41,0.1);
    border: 2px solid rgba(244,133,41,0.3);
    color: #f48529;
    padding: 0.8rem 1.5rem;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Orbix','Courier New',monospace;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    transition: all 0.3s ease;
    text-transform: uppercase;
  }
  .event-btn:hover {
    background: rgba(244,133,41,0.2);
    border-color: #f48529;
    box-shadow: 0 0 20px rgba(244,133,41,0.3);
    transform: translateY(-2px);
  }
  .event-btn.active {
    background: rgba(244,133,41,0.3);
    border-color: #f48529;
    box-shadow: 0 0 25px rgba(244,133,41,0.5);
  }
  .countdown-display {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin: 2rem 0;
    flex-wrap: wrap;
  }
  .time-unit {
    background: rgba(244,133,41,0.05);
    border: 2px solid rgba(244,133,41,0.3);
    border-radius: 15px;
    padding: 1.5rem 1rem;
    min-width: 100px;
    backdrop-filter: blur(5px);
  }
  .time-value {
    color: #f48529;
    font-size: clamp(2.5rem,8vw,4rem);
    text-shadow: 0 0 15px rgba(244,133,41,0.8), 0 0 30px rgba(244,133,41,0.4);
    line-height: 1;
    margin-bottom: 0.5rem;
    font-weight: bold;
  }
  .time-label {
    color: #aaa;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .event-info {
    margin-top: 2rem;
    padding: 1.5rem;
    background: rgba(244,133,41,0.05);
    border-radius: 10px;
    border: 1px solid rgba(244,133,41,0.2);
  }
  .event-date { font-size: 1.1rem; color: #f4a55d; margin-bottom: 0.5rem; letter-spacing: 0.1em; }
  .event-description { font-size: 1rem; color: #ccc; line-height: 1.6; }
  .subtext { margin-top: 2rem; font-size: 1.1rem; color: #aaa; letter-spacing: 0.1em; font-style: italic; }
  .completed-message {
    background: linear-gradient(135deg,rgba(244,133,41,0.2),rgba(244,165,93,0.2));
    padding: 2rem; border-radius: 15px; border: 2px solid #f48529;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.02)} }
  .progress-container { margin-top: 2rem; width: 100%; }
  .progress-bar { height: 8px; background: rgba(244,133,41,0.1); border-radius: 10px; overflow: hidden; border: 1px solid rgba(244,133,41,0.3); }
  .progress-fill { height: 100%; background: linear-gradient(90deg,#f48529,#f4a55d); border-radius: 10px; transition: width 1s ease; box-shadow: 0 0 10px rgba(244,133,41,0.5); }
  .progress-text { margin-top: 0.5rem; font-size: 0.9rem; color: #aaa; text-align: center; }
  @media (max-width: 768px) {
    .countdown-container { padding: 2rem 1rem; }
    .time-unit { min-width: 80px; padding: 1rem 0.5rem; }
    .event-btn { padding: 0.6rem 1rem; font-size: 0.8rem; }
  }
</style>
</head>
<body>
<div id="particles-js"></div>
<div class="countdown-container">

</div>
  <div class="subtitle">Event Countdown</div>

  <div class="event-selector" id="eventSelector"></div>
  <div class="countdown-display" id="countdownDisplay"></div>
  <div class="progress-container">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText"></div>
  </div>
  <div class="event-info">
    <div class="event-date" id="eventDate"></div>
    <div class="event-description" id="eventDescription"></div>
  </div>
  <div class="subtext" id="subtext">We're all waiting for it...</div>
</div>

<script src="./static/particles.js/2.0.0/particles.min.js"></script>
<script>
  const events = [
    { id:'wait-applications', name:'Waiting Applications', date:new Date("Apr 17, 2026 12:00:00"), description:"We're all waiting for it...", color:'#f48529' },
    { id:'applications', name:'Start', date:new Date("Jul 21, 2026 00:00:00"), description:'Ready to start...', color:'#66ff99' },
    { id:'started', name:'Commit Countdown...', date:new Date("Jul 26, 2026 07:00:00"), description:'DO IT! DO IT! DO IT!', color:'#ffaa33' },
    { id:'commited', name:'Music Fes', date:new Date("Jul 26, 2026 18:00:00"), description:'Music festival!', color:'#3366ff' }
  ];
  let currentEventIndex = 0;

  particlesJS("particles-js",{"particles":{"number":{"value":60,"density":{"enable":true,"value_area":1000}},"color":{"value":"#f48529"},"shape":{"type":"circle"},"opacity":{"value":0.4,"random":true,"anim":{"enable":true,"speed":1,"opacity_min":0.1,"sync":false}},"size":{"value":3,"random":true,"anim":{"enable":true,"speed":2,"size_min":0.5,"sync":false}},"line_linked":{"enable":true,"distance":150,"color":"#f48529","opacity":0.25,"width":1},"move":{"enable":true,"speed":1.5,"direction":"none","random":true,"straight":false,"out_mode":"out","bounce":false}},"interactivity":{"detect_on":"canvas","events":{"onhover":{"enable":true,"mode":"grab"},"onclick":{"enable":true,"mode":"push"},"resize":true},"modes":{"grab":{"distance":140,"line_linked":{"opacity":0.5}},"push":{"particles_nb":4}}},"retina_detect":true});

  function renderEventSelector() {
    document.getElementById('eventSelector').innerHTML = events.map((e,i) =>
      `<button class="event-btn ${i===currentEventIndex?'active':''}" onclick="selectEvent(${i})">${e.name}</button>`
    ).join('');
  }
  function selectEvent(i) {
    currentEventIndex = i;
    renderEventSelector();
    updateCountdown();
    try {
      if(window.pJSDom&&window.pJSDom[0]&&window.pJSDom[0].pJS){
        window.pJSDom[0].pJS.particles.color.value = events[i].color;
        window.pJSDom[0].pJS.particles.line_linked.color = events[i].color;
        if(window.pJSDom[0].pJS.fn&&window.pJSDom[0].pJS.fn.particlesRefresh) window.pJSDom[0].pJS.fn.particlesRefresh();
      }
    } catch(e){}
  }
  function updateCountdown() {
    const ev = events[currentEventIndex];
    const now = Date.now();
    const left = ev.date.getTime() - now;
    const display = document.getElementById('countdownDisplay');
    document.getElementById('eventDate').textContent = ev.date.toLocaleString('zh-CN',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});
    document.getElementById('eventDescription').textContent = ev.description;
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    if(left < 0) {
      display.innerHTML = '<div class="completed-message"><div style="font-size:2rem;margin-bottom:1rem;">✓</div><div style="font-size:1.5rem;color:#f48529;">Event Completed!</div></div>';
      document.getElementById('subtext').textContent = "Moving on to the next milestone...";
      progressFill.style.width = '100%'; progressText.textContent = 'Completed';
      const next = events.findIndex((e,i)=>i>currentEventIndex&&e.date.getTime()>now);
      if(next!==-1) setTimeout(()=>selectEvent(next),3000);
      return;
    }
    const d=Math.floor(left/86400000), h=Math.floor(left%86400000/3600000), m=Math.floor(left%3600000/60000), s=Math.floor(left%60000/1000);
    let html='';
    if(d>0) html+=`<div class="time-unit"><div class="time-value">${String(d).padStart(2,'0')}</div><div class="time-label">Days</div></div>`;
    html+=`<div class="time-unit"><div class="time-value">${String(h).padStart(2,'0')}</div><div class="time-label">Hours</div></div>`;
    html+=`<div class="time-unit"><div class="time-value">${String(m).padStart(2,'0')}</div><div class="time-label">Minutes</div></div>`;
    html+=`<div class="time-unit"><div class="time-value">${String(s).padStart(2,'0')}</div><div class="time-label">Seconds</div></div>`;
    display.innerHTML = html;
    const first = events[0].date.getTime(), total = ev.date.getTime()-first, elapsed = now-first;
    const pct = Math.max(0,Math.min(100,elapsed/total*100));
    progressFill.style.width = pct+'%';
    progressText.textContent = pct.toFixed(1)+'% to '+ev.name;
    const sub = document.getElementById('subtext');
    if(d>7) sub.textContent="Mark your calendar!";
    else if(d>0) sub.textContent="Getting close...";
    else if(h>1) sub.textContent="Almost there!";
    else sub.textContent="Any moment now...";
  }
  renderEventSelector();
  updateCountdown();
  setInterval(updateCountdown,1000);
  const now = Date.now();
  const upcoming = events.findIndex(e=>e.date.getTime()>now);
  if(upcoming!==-1) selectEvent(upcoming);
</script>
</body>
