<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdventureX Countdown</title>
<style>
  @font-face {
    font-family: 'Orbixbeta';
    src: url('https://s3.adventure-x.org/Fonts/Orbixbeta-Regular.otf') format('opentype');
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: linear-gradient(135deg, #0a0a0a 0%, #1a0a1a 100%);
    color: #F48529;
    font-family: 'Orbixbeta', monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    overflow-x: hidden;
    position: relative;
  }

  /* 粒子背景 */
  #particles-js {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 0;
    top: 0;
    left: 0;
  }

  .countdown-container {
    text-align: center;
    z-index: 1;
    position: relative;
    padding: 3rem 2rem;
    border-radius: 20px;
    max-width: 90%;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(223, 206, 172, 0.2);
    box-shadow: 0 8px 32px rgba(223, 206, 172, 0.1);
  }

  .title {
    font-size: clamp(1.5rem, 5vw, 2.5rem);
    margin-bottom: 2rem;
    color: #F48529;
    text-shadow: 0 0 20px rgba(223, 206, 172, 0.8),
                 0 0 40px rgba(223, 206, 172, 0.4);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    animation: glow 2s ease-in-out infinite alternate;
  }

  @keyframes glow {
    from {
      text-shadow: 0 0 20px rgba(223, 206, 172, 0.8),
                   0 0 40px rgba(223, 206, 172, 0.4);
    }
    to {
      text-shadow: 0 0 30px rgba(223, 206, 172, 1),
                   0 0 60px rgba(223, 206, 172, 0.6);
    }
  }

  .event-selector {
    margin-bottom: 2rem;
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .event-btn {
    background: rgba(223, 206, 172, 0.1);
    border: 2px solid rgba(223, 206, 172, 0.3);
    color: #F48529;
    padding: 0.8rem 1.5rem;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Orbixbeta', monospace;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    transition: all 0.3s ease;
    text-transform: uppercase;
  }

  .event-btn:hover {
    background: rgba(223, 206, 172, 0.2);
    border-color: #F48529;
    box-shadow: 0 0 20px rgba(223, 206, 172, 0.3);
    transform: translateY(-2px);
  }

  .event-btn.active {
    background: rgba(223, 206, 172, 0.3);
    border-color: #F48529;
    box-shadow: 0 0 25px rgba(223, 206, 172, 0.5);
  }

  .countdown-display {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin: 2rem 0;
    flex-wrap: wrap;
  }

  .time-unit {
    background: rgba(223, 206, 172, 0.05);
    border: 2px solid rgba(223, 206, 172, 0.3);
    border-radius: 15px;
    padding: 1.5rem 1rem;
    min-width: 100px;
    backdrop-filter: blur(5px);
  }

  .time-value {
    color: #F48529;
    font-size: clamp(2.5rem, 8vw, 4rem);
    text-shadow: 0 0 15px rgba(223, 206, 172, 0.8),
                 0 0 30px rgba(223, 206, 172, 0.4);
    line-height: 1;
    margin-bottom: 0.5rem;
    font-weight: bold;
  }

  .time-label {
    color: #aaa;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .event-info {
    margin-top: 2rem;
    padding: 1.5rem;
    background: rgba(223, 206, 172, 0.05);
    border-radius: 10px;
    border: 1px solid rgba(223, 206, 172, 0.2);
  }

  .event-date {
    font-size: 1.1rem;
    color: #F48529;
    margin-bottom: 0.5rem;
    letter-spacing: 0.1em;
  }

  .event-description {
    font-size: 1rem;
    color: #eee;
    line-height: 1.6;
  }

  .subtext {
    margin-top: 2rem;
    font-size: 1.1rem;
    color: #F48529;
    letter-spacing: 0.1em;
    font-style: italic;
  }

  .completed-message {
    background: linear-gradient(135deg, rgba(223, 206, 172, 0.2), rgba(223, 206, 172, 0.2));
    padding: 2rem;
    border-radius: 15px;
    border: 2px solid #F48529;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.02); }
  }

  .progress-container {
    margin-top: 2rem;
    width: 100%;
  }

  .progress-bar {
    height: 8px;
    background: rgba(223, 206, 172, 0.1);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid rgba(223, 206, 172, 0.3);
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #F48529, #E6D9B5);
    border-radius: 10px;
    transition: width 1s ease;
    box-shadow: 0 0 10px rgba(223, 206, 172, 0.5);
  }

  .progress-text {
    margin-top: 0.5rem;
    font-size: 0.9rem;
    color: #F48529;
    text-align: center;
  }

  @media (max-width: 768px) {
    .countdown-container {
      padding: 2rem 1rem;
    }

    .time-unit {
      min-width: 80px;
      padding: 1rem 0.5rem;
    }

    .event-btn {
      padding: 0.6rem 1rem;
      font-size: 0.8rem;
    }
  }
</style>
</head>
<body>
<div id="particles-js"></div>

<div class="countdown-container">
  <div class="title">AdventureX Event Countdown</div>
  <div class="event-selector" id="eventSelector"></div>
  <div class="countdown-display" id="countdownDisplay"></div>

  <div class="progress-container">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-text" id="progressText"></div>
  </div>

  <div class="event-info">
    <div class="event-date" id="eventDate"></div>
    <div class="event-description" id="eventDescription"></div>
  </div>

  <div class="subtext" id="subtext">We're all waiting for it...</div>
</div>

<script src="./static/particles.js/2.0.0/particles.min.js"></script>
<script>
  const mainColor = 'oklch(0.7261 0.1663 54.4)';
  const mainColorRGB = '234,102,120'; // 近似转换后的 RGB，用于 rgba()

  const events = [
    { id: 'wait-applications', name: 'Waiting Applications', date: new Date("Apr 17, 2026 08:00:00"), description: 'We\'re all waiting for it...', color: mainColor },
    { id: 'applications', name: 'Applications', date: new Date("Jul 21, 2026 09:00:00"), description: 'Sign it up for your journey!', color: mainColor },
    { id: 'started', name: 'Commit Countdown...', date: new Date("Jul 26, 2026 07:00:00"), description: 'DO IT! DO IT! DO IT!', color: mainColor },
    { id: 'commited', name: 'Expo!', date: new Date("Jul 26, 2026 23:00:00"), description: 'Expo time!', color: mainColor }
  ];

  let currentEventIndex = 0;
  let countdownInterval;

  particlesJS("particles-js", {
    "particles": {
      "number": { "value": 60, "density": { "enable": true, "value_area": 1000 } },
      "color": { "value": mainColor },
      "shape": { "type": "circle" },
      "opacity": { "value": 0.4, "random": true, "anim": { "enable": true, "speed": 1, "opacity_min": 0.1, "sync": false } },
      "size": { "value": 3, "random": true, "anim": { "enable": true, "speed": 2, "size_min": 0.5, "sync": false } },
      "line_linked": { "enable": true, "distance": 150, "color": mainColor, "opacity": 0.25, "width": 1 },
      "move": { "enable": true, "speed": 1.5, "direction": "none", "random": true, "straight": false, "out_mode": "out", "bounce": false }
    },
    "interactivity": { "detect_on": "canvas", "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" }, "resize": true }, "modes": { "grab": { "distance": 140, "line_linked": { "opacity": 0.5 } }, "push": { "particles_nb": 4 } } },
    "retina_detect": true
  });

  function renderEventSelector() {
    const selector = document.getElementById('eventSelector');
    selector.innerHTML = events.map((event, index) => `
      <button class="event-btn ${index === currentEventIndex ? 'active' : ''}" onclick="selectEvent(${index})">
        ${event.name}
      </button>
    `).join('');
  }

  function selectEvent(index) {
    currentEventIndex = index;
    renderEventSelector();
    updateCountdown();
    updateParticleColor(events[index].color);
  }

  function updateParticleColor(color) {
    if (window.pJSDom && window.pJSDom[0]) {
      window.pJSDom[0].pJS.particles.color.value = color;
      window.pJSDom[0].pJS.particles.line_linked.color = color;
      window.pJSDom[0].fn.particlesRefresh();
    }
  }

  function updateCountdown() {
    const event = events[currentEventIndex];
    const now = new Date().getTime();
    const targetTime = event.date.getTime();
    const timeLeft = targetTime - now;

    const display = document.getElementById('countdownDisplay');
    const dateEl = document.getElementById('eventDate');
    const descEl = document.getElementById('eventDescription');
    const subtext = document.getElementById('subtext');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');

    dateEl.textContent = event.date.toLocaleString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    descEl.textContent = event.description;

    if (timeLeft < 0) {
      display.innerHTML = `
        <div class="completed-message">
          <div style="font-size: 2rem; margin-bottom: 1rem;">✓</div>
          <div style="font-size: 1.5rem; color: ${mainColor};">Event Completed!</div>
        </div>
      `;
      subtext.textContent = "Moving on to the next milestone...";
      progressFill.style.width = '100%';
      progressText.textContent = 'Completed';
      const nextEventIndex = events.findIndex((e, i) => i > currentEventIndex && e.date.getTime() > now);
      if (nextEventIndex !== -1 && currentEventIndex !== nextEventIndex) {
        setTimeout(() => selectEvent(nextEventIndex), 3000);
      }
      return;
    }

    const days = Math.floor(timeLeft / (1000 * 60 * 60 * 24));
    const hours = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);

    display.innerHTML = `
      ${days > 0 ? `<div class="time-unit"><div class="time-value">${days.toString().padStart(2,'0')}</div><div class="time-label">Days</div></div>` : ''}
      <div class="time-unit"><div class="time-value">${hours.toString().padStart(2,'0')}</div><div class="time-label">Hours</div></div>
      <div class="time-unit"><div class="time-value">${minutes.toString().padStart(2,'0')}</div><div class="time-label">Minutes</div></div>
      <div class="time-unit"><div class="time-value">${seconds.toString().padStart(2,'0')}</div><div class="time-label">Seconds</div></div>
    `;

    const firstEventTime = events[0].date.getTime();
    const totalDuration = targetTime - firstEventTime;
    const elapsed = now - firstEventTime;
    const progress = Math.max(0, Math.min(100, (elapsed / totalDuration) * 100));

    progressFill.style.width = progress + '%';
    progressText.textContent = `${progress.toFixed(1)}% to ${event.name}`;

    if (days > 7) subtext.textContent = "Mark your calendar!";
    else if (days > 0) subtext.textContent = "Getting close...";
    else if (hours > 1) subtext.textContent = "Almost there!";
    else subtext.textContent = "Any moment now...";
  }

  renderEventSelector();
  updateCountdown();
  countdownInterval = setInterval(updateCountdown, 1000);

  const now = new Date().getTime();
  const upcomingEventIndex = events.findIndex(e => e.date.getTime() > now);
  if (upcomingEventIndex !== -1) selectEvent(upcomingEventIndex);
</script>
</body>
</html>
