<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdventureX Countdown</title>
<style>
  @font-face {
    font-family: 'Orbixbeta';
    src: url('https://s3.adventure-x.org/Fonts/Orbixbeta-Regular.otf') format('opentype');
  }
  
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  /* 现代浏览器使用 OKLCH 变量 */
  :root {
    --primary-color: oklch(0.7261 0.1663 54.4);
    --primary-glow: oklch(0.7261 0.1663 54.4 / 0.8);
    --primary-dim: oklch(0.7261 0.1663 54.4 / 0.2);
  }
  
  body {
    background: linear-gradient(135deg, #0a0a0a 0%, #1a150a 100%);
    color: #fff;
    font-family: 'Orbixbeta', monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    overflow-x: hidden;
    position: relative;
  }
  
  #particles-js {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 0;
    top: 0;
    left: 0;
  }
  
  .countdown-container {
    text-align: center;
    z-index: 1;
    position: relative;
    padding: 3rem 2rem;
    border-radius: 20px;
    max-width: 90%;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(10px);
    border: 1px solid var(--primary-dim);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  }
  
  .title {
    font-size: clamp(1.5rem, 5vw, 2.5rem);
    margin-bottom: 2rem;
    color: var(--primary-color);
    text-shadow: 0 0 20px var(--primary-glow);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    animation: glow 2s ease-in-out infinite alternate;
  }
  
  @keyframes glow {
    from { text-shadow: 0 0 20px var(--primary-glow); }
    to { text-shadow: 0 0 30px var(--primary-color), 0 0 50px var(--primary-glow); }
  }
  
  .event-selector {
    margin-bottom: 2rem;
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  
  .event-btn {
    background: var(--primary-dim);
    border: 2px solid oklch(0.7261 0.1663 54.4 / 0.3);
    color: var(--primary-color);
    padding: 0.8rem 1.5rem;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Orbixbeta', monospace;
    font-size: 0.9rem;
    transition: all 0.3s ease;
  }
  
  .event-btn.active {
    background: oklch(0.7261 0.1663 54.4 / 0.4);
    border-color: var(--primary-color);
    box-shadow: 0 0 20px var(--primary-glow);
  }
  
  .countdown-display {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin: 2rem 0;
    flex-wrap: wrap;
  }
  
  .time-unit {
    background: oklch(0.7261 0.1663 54.4 / 0.05);
    border: 2px solid oklch(0.7261 0.1663 54.4 / 0.3);
    border-radius: 15px;
    padding: 1.5rem 1rem;
    min-width: 100px;
    backdrop-filter: blur(5px);
  }
  
  .time-value {
    color: var(--primary-color);
    font-size: clamp(2.5rem, 8vw, 4rem);
    text-shadow: 0 0 15px var(--primary-glow);
    line-height: 1;
    margin-bottom: 0.5rem;
  }
  
  .progress-bar {
    height: 8px;
    background: oklch(0.7261 0.1663 54.4 / 0.1);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid oklch(0.7261 0.1663 54.4 / 0.2);
  }
  
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary-color), #fff);
    transition: width 1s ease;
    box-shadow: 0 0 10px var(--primary-glow);
  }

  .event-date { color: oklch(0.8 0.1 54.4); margin-bottom: 0.5rem; }
  .event-info { margin-top: 2rem; padding: 1.5rem; background: rgba(0,0,0,0.2); border-radius: 10px; }
  .time-label { color: #aaa; font-size: 0.8rem; text-transform: uppercase; }
  .progress-text { margin-top: 0.5rem; font-size: 0.9rem; color: #aaa; }
</style>
</head>
<body>
<div id="particles-js"></div>

<div class="countdown-container">
  <div class="title">AdventureX Event Countdown</div>
  <div id="eventSelector" class="event-selector"></div>
  <div id="countdownDisplay" class="countdown-display"></div>
  <div class="progress-container">
    <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
    <div id="progressText" class="progress-text"></div>
  </div>
  <div class="event-info">
    <div id="eventDate" class="event-date"></div>
    <div id="eventDescription" class="event-description"></div>
  </div>
</div>

<script src="./static/particles.js/2.0.0/particles.min.js"></script>
<script>
  // particles.js 不支持 oklch，必须使用 hex 颜色
  const hexThemeColor = "#E58D2E"; 

  const events = [
    { id: 'wait', name: 'Wait', date: new Date("Apr 17, 2026 08:00:00"), description: "Waiting...", color: hexThemeColor },
    { id: 'apps', name: 'Apps', date: new Date("Jul 21, 2026 09:00:00"), description: "Sign up!", color: "#66ff99" },
    { id: 'start', name: 'Start', date: new Date("Jul 26, 2026 07:00:00"), description: "Do it!", color: "#ffaa33" }
  ];

  let currentIndex = 0;

  // 初始化粒子
  particlesJS("particles-js", {
    "particles": {
      "number": { "value": 60 },
      "color": { "value": hexThemeColor },
      "line_linked": { "enable": true, "color": hexThemeColor, "opacity": 0.3 },
      "move": { "enable": true, "speed": 1.5 }
    },
    "interactivity": { "events": { "onhover": { "enable": true, "mode": "grab" } } },
    "retina_detect": true
  });

  function selectEvent(index) {
    currentIndex = index;
    renderSelector();
    update();
    // 动态更新粒子颜色（也要用 hex）
    if(window.pJSDom[0]) {
      window.pJSDom[0].pJS.particles.color.value = events[index].color;
      window.pJSDom[0].pJS.particles.line_linked.color = events[index].color;
      window.pJSDom[0].fn.particlesRefresh();
    }
  }

  function renderSelector() {
    document.getElementById('eventSelector').innerHTML = events.map((e, i) => 
      `<button class="event-btn ${i===currentIndex?'active':''}" onclick="selectEvent(${i})">${e.name}</button>`
    ).join('');
  }

  function update() {
    const e = events[currentIndex];
    const now = new Date().getTime();
    const diff = e.date.getTime() - now;
    
    document.getElementById('eventDate').textContent = e.date.toLocaleString();
    document.getElementById('eventDescription').textContent = e.description;

    if (diff < 0) {
      document.getElementById('countdownDisplay').innerHTML = "COMPLETED";
      return;
    }

    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);

    document.getElementById('countdownDisplay').innerHTML = `
      <div class="time-unit"><div class="time-value">${d}</div><div class="time-label">Days</div></div>
      <div class="time-unit"><div class="time-value">${h}</div><div class="time-label">Hours</div></div>
      <div class="time-unit"><div class="time-value">${m}</div><div class="time-label">Mins</div></div>
      <div class="time-unit"><div class="time-value">${s}</div><div class="time-label">Secs</div></div>
    `;
  }

  renderSelector();
  setInterval(update, 1000);
  update();
</script>
</body>
</html>
